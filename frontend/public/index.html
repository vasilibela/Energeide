        <script>
            // PostHog telemetry retry handler
            (function () {
                const POSTHOG_RETRY_MARKER = "__phRetryCount";
                const MAX_RETRIES = 3;
                const RETRY_DELAY = 1000;
                let hasPhTelemetryFailures = false;
                window.addEventListener(
                    "error",
                    function (e) {
                        if (e.target && e.target.tagName === "SCRIPT") {
                            const src = e.target.src || "";
                            if (src.includes("posthog.com")) {
                                hasPhTelemetryFailures = true;
                                const retryCount =
                                    parseInt(
                                        e.target.getAttribute(
                                            POSTHOG_RETRY_MARKER
                                        ) || "0"
                                    );
                                if (retryCount < MAX_RETRIES) {
                                    setTimeout(function () {
                                        const newScript =
                                            document.createElement("script");
                                        newScript.src = src;
                                        newScript.async = true;
                                        newScript.setAttribute(
                                            POSTHOG_RETRY_MARKER,
                                            (retryCount + 1).toString()
                                        );
                                        document.head.appendChild(newScript);
                                    }, RETRY_DELAY * (retryCount + 1));
                                }
                            }
                        }
                    },
                    true
                );
            })();
